<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Perfect Fit Replica</title>
    <style>
        body { background: #faf9f6; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .logo-preview { display: flex; align-items: center; gap: 8px; font-size: 32px; font-weight: 800; color: #1c1917; letter-spacing: -0.03em; margin-bottom: 40px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; text-align: center; }
        .label { font-size: 14px; color: #666; margin-top: 8px; }
    </style>
</head>
<body>
    
    <div class="logo-preview">
        <!-- 32px version -->
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <!-- Left Block: Outline of 'P' -->
            <path d="M 6 20 A 2 2 0 0 1 4 18 L 4 6 A 2 2 0 0 1 6 4 L 14 4 A 2 2 0 0 1 16 6 L 16 10 A 2 2 0 0 1 14 12 L 10 12 A 2 2 0 0 0 8 14 L 8 18 A 2 2 0 0 1 6 20 Z" />
            
            <!-- Right Block: Blue solid piece fitting exactly into the negative space -->
            <path d="M 17 6 V 10 A 5 5 0 0 1 12 15 H 10 A 1 1 0 0 0 11 14 V 18.5 A 3 3 0 0 0 14 21.5 H 18.5 A 3 3 0 0 0 21.5 18.5 V 6 A 3.5 3.5 0 0 0 18 2.5 H 17 Z" fill="#2563eb" stroke="none" />
        </svg>
        PitaPrompt
    </div>

    <div class="grid">
        <div>
            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#1c1917" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <path d="M 6 20 A 2 2 0 0 1 4 18 L 4 6 A 2 2 0 0 1 6 4 L 14 4 A 2 2 0 0 1 16 6 L 16 10 A 2 2 0 0 1 14 12 L 10 12 A 2 2 0 0 0 8 14 L 8 18 A 2 2 0 0 1 6 20 Z" />
                <path d="M 17 6 V 10 A 5 5 0 0 1 12 15 H 10 A 1 1 0 0 0 11 14 V 18.5 A 3 3 0 0 0 14 21.5 H 18.5 A 3 3 0 0 0 21.5 18.5 V 6 A 3.5 3.5 0 0 0 18 2.5 H 17 Z" fill="#2563eb" stroke="none" />
            </svg>
            <div class="label">64px Detail</div>
        </div>
        <div>
            <div style="font-size: 24px; font-weight: 700; display: flex; align-items: center; gap: 6px; justify-content: center;">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1c1917" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M 6 20 A 2 2 0 0 1 4 18 L 4 6 A 2 2 0 0 1 6 4 L 14 4 A 2 2 0 0 1 16 6 L 16 10 A 2 2 0 0 1 14 12 L 10 12 A 2 2 0 0 0 8 14 L 8 18 A 2 2 0 0 1 6 20 Z" />
                    <path d="M 17 6 V 10 A 5 5 0 0 1 12 15 H 10 A 1 1 0 0 0 11 14 V 18.5 A 3 3 0 0 0 14 21.5 H 18.5 A 3 3 0 0 0 21.5 18.5 V 6 A 3.5 3.5 0 0 0 18 2.5 H 17 Z" fill="#2563eb" stroke="none" />
                </svg>
                PitaPrompt
            </div>
            <div class="label">24px UI Standard</div>
        </div>
        <div>
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1c1917" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <path d="M 6 20 A 2 2 0 0 1 4 18 L 4 6 A 2 2 0 0 1 6 4 L 14 4 A 2 2 0 0 1 16 6 L 16 10 A 2 2 0 0 1 14 12 L 10 12 A 2 2 0 0 0 8 14 L 8 18 A 2 2 0 0 1 6 20 Z" />
                <path d="M 17 6 V 10 A 5 5 0 0 1 12 15 H 10 A 1 1 0 0 0 11 14 V 18.5 A 3 3 0 0 0 14 21.5 H 18.5 A 3 3 0 0 0 21.5 18.5 V 6 A 3.5 3.5 0 0 0 18 2.5 H 17 Z" fill="#2563eb" stroke="none" />
            </svg>
            <div class="label">16px Favicon</div>
        </div>
    </div>

</body>
</html>
